<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal OKTSHOP17</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

    <aside id="sidebar">
        <div class="sidebar-brand" style="padding:25px; text-align:center; color:var(--gold); font-weight:800;">OKTSHOP17</div>
        <nav id="sidebarNav"></nav>
    </aside>

    <div id="loginScreen">
        <div class="login-container">
            <h2 class="auth-title">OKTSHOP17</h2>
            <div class="auth-tabs">
                <button onclick="switchAuth('login')" id="tLog" class="tab-btn active">MASUK</button>
                <button onclick="switchAuth('register')" id="tReg" class="tab-btn">DAFTAR</button>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Kata Sandi" required>
                </div>
                <button type="submit" class="btn-primary">MASUK</button>
            </form>
            <form id="registerForm" class="hidden">
                <div class="input-group">
                    <input type="text" id="regNama" placeholder="Nama Lengkap" required>
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <input type="password" id="regPassword" placeholder="Password" minlength="6" required>
                </div>
                <button type="submit" class="btn-primary">DAFTAR</button>
            </form>
        </div>
    </div>

    <div id="appWrapper" class="hidden">
        <main id="mainContent">
            <header class="top-nav">
                <div class="nav-left">
                    <button class="menu-toggle" onclick="toggleSidebar(true)">☰</button>
                    <span class="logo-text">OKTSHOP17</span>
                </div>
                <button onclick="logout()" class="btn-logout">KELUAR</button>
            </header>

            <div class="content-body">
                <div class="welcome-container">Halo, <span id="userGreetName">User</span>! 👋</div>

                <!-- DASHBOARD -->
                <section id="secResellerDashboard" class="app-section hidden">
                    <div class="stat-grid">
                        <div class="stat-card c1"><div>QTY</div><div id="resQty" class="stat-value">0</div></div>
                        <div class="stat-card c2"><div>TOTAL BELANJA</div><div id="resTotal" class="stat-value">Rp 0</div></div>
                        <div class="stat-card c3"><div>POIN</div><div id="resPoin" class="stat-value">0</div></div>
                    </div>
                    
                    <div class="card">
                        <h3 style="margin-bottom:15px">🏆 Top 10 Reseller Teraktif</h3>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th width="40" class="txt-center">No</th>
                                        <th>Nama Reseller</th>
                                        <th width="80" class="txt-center">Poin</th>
                                    </tr>
                                </thead>
                                <tbody id="resellerLeaderboardTable"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h3>Riwayat Pesanan</h3>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Customer</th><th>Produk</th><th class="txt-right">Total</th><th class="txt-center">Status</th></tr></thead>
                                <tbody id="resellerOrderTable"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- FORM RETUR -->
                <section id="secResellerReturn" class="app-section hidden">
                    <div class="card">
                        <h3>📦 Ajukan Retur</h3>
                        <form id="resellerReturnForm" class="form-styled">
                            <input type="text" id="retProd" placeholder="Produk & Qty" required>
                            <textarea id="retReason" placeholder="Alasan Retur" required></textarea>
                            <input type="tel" id="retHp" placeholder="Nomor WA Aktif" required>
                            <button type="submit" class="btn-primary">KIRIM</button>
                        </form>
                    </div>
                    <div class="card">
                        <h3>📋 Riwayat Returan</h3>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>No. Tiket</th><th class="txt-center">Status</th></tr></thead>
                                <tbody id="resellerReturnTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- FORM KELUHAN -->
                <section id="secResellerComplaint" class="app-section hidden">
                    <div class="card">
                        <h3>📢 Laporan Keluhan</h3>
                        <form id="resellerComplaintForm" class="form-styled">
                            <input type="tel" id="compHp" placeholder="Nomor WA Aktif" required>
                            <textarea id="compText" placeholder="Isi Keluhan..." required></textarea>
                            <button type="submit" class="btn-primary">KIRIM</button>
                        </form>
                    </div>
                    <div class="card">
                        <h3>📋 Riwayat Laporan</h3>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>No. Tiket</th><th class="txt-center">Status</th></tr></thead>
                                <tbody id="resellerComplaintTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- PROFIL -->
                <section id="secProfile" class="app-section hidden">
                    <div class="card">
                        <h3>👤 Profil Akun</h3>
                        <form id="editProfileForm" class="form-styled">
                            <label style="font-size:11px; color:#888;">Email</label>
                            <input type="email" id="profEmail" readonly>
                            <label style="font-size:11px; color:#888;">Nama</label>
                            <input type="text" id="profNama" required>
                            <label style="font-size:11px; color:#888;">WhatsApp</label>
                            <input type="tel" id="profHp" required>
                            <button type="submit" class="btn-primary">UPDATE PROFIL</button>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
